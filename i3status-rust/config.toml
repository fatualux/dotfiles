icons_format = "{icon}"

[theme]
theme = "nord-dark"
[theme.overrides]
idle_bg = "#121516"
idle_fg = "#abcdef"

[icons]
icons = "awesome6"

[[block]]
block = "net"
format = " $icon  {$signal_strength  $ssid|Wired connection} "
format_alt = "$speed_down $graph_down   $graph_up $speed_up "
interval = 1

[[block]]
block = "nvidia_gpu"
format = " $icon $name ..: T. $temperature - M. $memory - U. $utilization :.. "
[[block.click]]
button = "left"
cmd = "nvidia-settings"

[[block]]
block = "pacman"
format = " $icon PCM $pacman - AUR $aur "
format_up_to_date = ""
aur_command = "trizen -Qua"
[[block.click]]
button = "left"
cmd = "xterm -e 'trizen -Syu'"

[[block]]
block = "temperature"
format = " $icon $average "
format_alt = " $icon $min - $max "

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 20
warning = 20.0
alert = 10.0
format = " $icon / $available.eng(w:2) "
merge_with_next = true

[[block]]
block = "disk_space"
path = "/home"
info_type = "used"
alert_unit = "GB"
interval = 20
warning = 0
alert = 0
format = " $icon HOME $available.eng(w:2) "

[[block]]
block = "cpu"
[[block.click]]
button = "left"
cmd = "alacritty -e 'btop'"

[[block]]
block = "memory"
format = " $icon $mem_total_used_percents.eng(w:2) "
format_alt = " $icon_swap $swap_used_percents.eng(w:2) "

[[block]]
block = "sound"
[[block.click]]
button = "left"
cmd = "pavucontrol"

[[block]]
block = "battery"
device = "BAT1"
interval = 1
format = " $icon $percentage $time $power "
missing_format = ""
full_format = " $icon $percentage $power "
charging_format = " $icon $percentage $time $power "
empty_format = " $icon $percentage "

[[block]]
block = "bluetooth"
mac = "08:71:90:FD:4F:CF"
format = "$icon $name{ $percentage|}"
disconnected_format =  "  $icon "
[[block.click]]
button = "left"
cmd = "blueberry"
[block.battery_state]
"0..20" = "critical"
"21..70" = "warning"
"71..100" = "good"

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%a %d/%m %R') "
